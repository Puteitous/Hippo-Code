  - type: BASE_CHAT
    file: base/base_chat.md
    version: "1.0.0"
    enabled: true
    priority: 100
    description: "聊天模式 - 顾问角色，只读探索，提供建议但不执行"

  - type: BASE_CODING
    file: base/base_coding.md
    version: "1.0.0"
    enabled: true
    priority: 100
    description: "构建模式 - 工程师角色，全权限执行，主动解决问题"

  - type: BASE_RESEARCH
    file: base/base_coding.md
    version: "1.0.0"
    enabled: true
    priority: 100
    description: "研究模式 - 代码探索与架构分析"

config:
  defaultBase: BASE_CODING
  maxExpertPrompts: 2
  autoInjectEnabled: false

