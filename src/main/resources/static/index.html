<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hippo Memory</title>
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/common.css">
  <style>
    body {
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 {
      color: var(--text-primary);
      border-bottom: 2px solid var(--success-color);
      padding-bottom: 10px;
    }
    #notifications {
      margin-top: 20px;
    }
    .memory-card {
      border: 1px solid var(--border-color);
      margin: 12px 0;
      padding: 16px;
      border-radius: var(--radius-md);
      background: var(--bg-white);
      box-shadow: var(--shadow-md);
      animation: slideIn var(--transition-normal) ease-out;
    }
    .memory-card strong {
      color: var(--success-color);
    }
    .memory-card small {
      color: var(--text-muted);
    }
    .status {
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-size: var(--font-size-lg);
    }
    .status.connected {
      background: var(--success-bg);
      color: var(--success-text);
    }
    .status.disconnected {
      background: var(--error-bg);
      color: var(--error-text);
    }
  </style>
</head>
<body>
  <h1>🧠 Hippo Memory Dashboard</h1>
  <div id="status" class="status disconnected">连接中...</div>
  <div id="notifications"></div>
  <script type="module">
    import { SSEClient } from './js/sse-client.js';
    import { safeParseJSON } from './js/utils.js';

    const statusDiv = document.getElementById('status');
    const notificationsDiv = document.getElementById('notifications');

    const sseClient = new SSEClient('/sse/memory-events');

    sseClient.onOpen(() => {
      statusDiv.className = 'status connected';
      statusDiv.textContent = '✅ 已连接到 SSE 服务器';
    });

    sseClient.onError((attempts) => {
      statusDiv.className = 'status disconnected';
      if (attempts >= 10) {
        statusDiv.textContent = '❌ 连接失败次数过多，请刷新页面';
      } else {
        statusDiv.textContent = '❌ 连接断开，正在重连...';
      }
    });

    sseClient.on('memory_saved', (e) => {
      const data = safeParseJSON(e.data);
      if (!data) return;

      const card = document.createElement('div');
      card.className = 'memory-card';
      card.innerHTML = `
        <strong>💾 Memory Saved</strong><br>
        ID: ${data.id}<br>
        Type: ${data.type}<br>
        Tags: ${data.tags?.join(', ') || '无'}<br>
        <small>${new Date().toLocaleTimeString()}</small>
      `;
      notificationsDiv.insertBefore(card, notificationsDiv.firstChild);
    });

    sseClient.connect();
  </script>
</body>
</html>
