<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippo Chat</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/common.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--primary-dark);
            color: white;
            padding: 12px 20px;
            font-size: var(--font-size-3xl);
            font-weight: 600;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            line-height: 1.6;
        }

        .message.user {
            align-self: flex-end;
            background: var(--primary-dark);
            color: white;
            border-bottom-right-radius: var(--radius-sm);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--bg-white);
            color: var(--text-primary);
            border-bottom-left-radius: var(--radius-sm);
            box-shadow: var(--shadow-sm);
        }

        .message.assistant pre {
            background: var(--bg-code);
            padding: 12px;
            border-radius: var(--radius-sm);
            overflow-x: auto;
            margin: 8px 0;
        }

        .message.assistant code {
            font-family: var(--font-mono);
            font-size: 14px;
        }

        .message.assistant p {
            margin: 8px 0;
        }

        .message.assistant ul, .message.assistant ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        .input-container {
            background: var(--bg-white);
            padding: 16px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 12px;
        }

        .input-container input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: var(--font-size-xl);
        }

        .input-container input:focus {
            border-color: var(--primary-dark);
        }

        .input-container button {
            padding: 12px 24px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: var(--font-size-xl);
        }

        .input-container button:hover:not(:disabled) {
            background: var(--primary-dark-hover);
        }
    </style>
</head>
<body>
    <div class="header">Hippo Chat</div>
    
    <div class="chat-container" id="chatContainer">
        <div class="empty-state">发送消息开始对话</div>
    </div>

    <div class="input-container">
        <input type="text" id="messageInput" placeholder="输入消息..." autocomplete="off">
        <button id="sendBtn">发送</button>
    </div>

    <script type="module">
        import { ChatService } from './js/chat-service.js';
        import { renderMarkdown } from './js/markdown-renderer.js';
        import { generateSessionId } from './js/utils.js';

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        const chatService = new ChatService();
        let currentSessionId = generateSessionId();

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        function appendMessage(role, content) {
            const emptyState = chatContainer.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            if (role === 'assistant') {
                renderMarkdown(content).then(html => {
                    msgDiv.innerHTML = html;
                });
            } else {
                msgDiv.textContent = content;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return msgDiv;
        }

        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            messageInput.value = '';
            appendMessage('user', content);

            sendBtn.disabled = true;
            messageInput.disabled = true;

            const assistantMsg = document.createElement('div');
            assistantMsg.className = 'message assistant';
            assistantMsg.innerHTML = '<span class="typing-indicator">...</span>';
            chatContainer.appendChild(assistantMsg);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            let fullContent = '';

            try {
                await chatService.sendMessage(
                    currentSessionId,
                    content,
                    (parsed) => {
                        if (parsed.content) {
                            fullContent += parsed.content;
                            renderMarkdown(fullContent).then(html => {
                                assistantMsg.innerHTML = html;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            });
                        }
                    }
                );
            } catch (error) {
                assistantMsg.innerHTML = `<span style="color: var(--error-color);">错误: ${error.message}</span>`;
            } finally {
                sendBtn.disabled = false;
                messageInput.disabled = false;
                messageInput.focus();
            }
        }
    </script>
</body>
</html>
