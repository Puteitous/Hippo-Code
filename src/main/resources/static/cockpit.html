<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hippo Cockpit</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/cockpit.css">
    <link id="hljs-light-theme" rel="stylesheet" href="js/vendor/github.min.css">
    <link id="hljs-dark-theme" rel="stylesheet" href="js/vendor/github-dark.min.css" disabled>
    <script src="js/vendor/marked.min.js"></script>
    <script src="js/vendor/highlight.min.js"></script>
</head>
<body>
    <div class="header">
        <span>Hippo Cockpit</span>
        <div style="display:flex;align-items:center;gap:12px;">
            <button id="themeToggle" title="切换主题" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 6px;color:white;">🌙</button>
            <span id="sseStatus" class="sse-status disconnected">SSE 连接中...</span>
        </div>
    </div>
    
    <div class="main-container">
        <div class="session-panel">
            <div class="session-header">
                <span>会话</span>
                <button id="newSessionBtn" title="新建会话" style="background:none;border:none;cursor:pointer;font-size:18px;padding:2px 6px;color:var(--text-secondary);">+</button>
            </div>
            <div class="session-list" id="sessionList">
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-container" id="chatContainer">
                <div class="empty-state">发送消息开始对话</div>
                <div class="new-msg-hint" id="newMsgHint">↓ 新消息</div>
            </div>

            <div class="prompt-mode-bar" id="promptModeBar">
                <div class="prompt-mode-label">角色:</div>
                <div class="prompt-mode-options" id="promptModeOptions">
                </div>
                <button class="prompt-custom-btn" id="promptCustomBtn" title="自定义提示词">⚙️</button>
            </div>
            <div class="input-container">
                <textarea id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1" autocomplete="off"></textarea>
                <button id="stopBtn" style="display:none;" title="停止生成">⏹</button>
                <button id="sendBtn" title="发送消息">➤</button>
            </div>
        </div>

        <div class="memory-panel">
            <div class="memory-header">Memory Panel</div>
            <div class="memory-list" id="memoryList">
            </div>
        </div>
    </div>

    <div class="prompt-modal" id="promptModal" style="display:none;">
        <div class="prompt-modal-overlay"></div>
        <div class="prompt-modal-content">
            <div class="prompt-modal-header">
                <span>自定义 System Prompt</span>
                <button class="prompt-modal-close" id="promptModalClose">✕</button>
            </div>
            <div class="prompt-modal-body">
                <textarea id="promptModalText" placeholder="输入自定义系统提示词..." rows="8"></textarea>
                <div class="prompt-modal-hint">修改后将在新会话中生效，当前会话不受影响</div>
            </div>
            <div class="prompt-modal-footer">
                <button class="prompt-modal-cancel" id="promptModalCancel">取消</button>
                <button class="prompt-modal-save" id="promptModalSave">应用</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { ChatService } from './js/chat-service.js';
        import { ChatUI } from './js/chat-ui.js';
        import { SessionManager } from './js/session-manager.js';
        import { MemoryPanel } from './js/memory-panel.js';
        import { generateSessionId, escapeHtml } from './js/utils.js';
        import { renderMarkdown } from './js/markdown-renderer.js';

        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const stopBtn = document.getElementById('stopBtn');
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');
        const newMsgHint = document.getElementById('newMsgHint');
        const sseStatus = document.getElementById('sseStatus');
        const memoryList = document.getElementById('memoryList');
        const themeToggle = document.getElementById('themeToggle');

        const savedTheme = localStorage.getItem('hippo-theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
        applyHljsTheme(savedTheme);

        function applyHljsTheme(theme) {
            const lightSheet = document.getElementById('hljs-light-theme');
            const darkSheet = document.getElementById('hljs-dark-theme');
            if (theme === 'dark') {
                lightSheet.disabled = true;
                darkSheet.disabled = false;
            } else {
                lightSheet.disabled = false;
                darkSheet.disabled = true;
            }
        }

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('hippo-theme', next);
            themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
            applyHljsTheme(next);
        });

        const chatService = new ChatService();
        const chatUI = new ChatUI(chatContainer);
        const sessionManager = new SessionManager(sessionList, switchSession);
        const memoryPanel = new MemoryPanel(memoryList);

        window.sessionManagerInstance = sessionManager;

        let currentSessionId = generateSessionId();
        let currentAbortController = null;
        let userScrolledUp = false;
        let lastUserMessage = '';
        let currentSystemPrompt = null;
        let promptPresets = [];
        let selectedPresetId = localStorage.getItem('hippo-prompt-preset') || 'default';

        const promptModeBar = document.getElementById('promptModeBar');
        const promptModeOptions = document.getElementById('promptModeOptions');
        const promptCustomBtn = document.getElementById('promptCustomBtn');
        const promptModal = document.getElementById('promptModal');
        const promptModalText = document.getElementById('promptModalText');
        const promptModalClose = document.getElementById('promptModalClose');
        const promptModalCancel = document.getElementById('promptModalCancel');
        const promptModalSave = document.getElementById('promptModalSave');

        async function loadPromptPresets() {
            try {
                const response = await fetch('/api/system-prompts/presets');
                if (!response.ok) return;
                const data = await response.json();
                promptPresets = data.presets || [];
                renderPromptModeBar();
            } catch (e) {
                console.error('加载预设失败:', e);
            }
        }

        function renderPromptModeBar() {
            promptModeOptions.innerHTML = '';
            for (const preset of promptPresets) {
                const btn = document.createElement('button');
                btn.className = 'prompt-mode-btn' + (preset.id === selectedPresetId ? ' active' : '');
                btn.textContent = preset.name;
                btn.title = preset.description;
                btn.dataset.presetId = preset.id;
                btn.addEventListener('click', () => selectPreset(preset.id));
                promptModeOptions.appendChild(btn);
            }
            applySelectedPreset();
        }

        function selectPreset(presetId) {
            selectedPresetId = presetId;
            localStorage.setItem('hippo-prompt-preset', presetId);
            document.querySelectorAll('.prompt-mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.presetId === presetId);
            });
            applySelectedPreset();
        }

        function applySelectedPreset() {
            const preset = promptPresets.find(p => p.id === selectedPresetId);
            if (preset) {
                currentSystemPrompt = preset.id === 'default' ? null : preset.prompt;
                promptModalText.value = preset.prompt;
            }
        }

        promptCustomBtn.addEventListener('click', () => {
            promptModal.style.display = 'flex';
            const preset = promptPresets.find(p => p.id === selectedPresetId);
            if (preset) {
                promptModalText.value = currentSystemPrompt || preset.prompt;
            }
        });

        function closePromptModal() {
            promptModal.style.display = 'none';
        }

        promptModalClose.addEventListener('click', closePromptModal);
        promptModalCancel.addEventListener('click', closePromptModal);
        promptModal.querySelector('.prompt-modal-overlay').addEventListener('click', closePromptModal);

        promptModalSave.addEventListener('click', () => {
            const customPrompt = promptModalText.value.trim();
            if (customPrompt) {
                currentSystemPrompt = customPrompt;
                selectedPresetId = 'custom';
                localStorage.setItem('hippo-prompt-preset', 'custom');
                localStorage.setItem('hippo-custom-prompt', customPrompt);
                document.querySelectorAll('.prompt-mode-btn').forEach(btn => btn.classList.remove('active'));
            }
            closePromptModal();
        });

        if (selectedPresetId === 'custom') {
            const saved = localStorage.getItem('hippo-custom-prompt');
            if (saved) {
                currentSystemPrompt = saved;
                promptModalText.value = saved;
            }
        }

        loadPromptPresets();

        sessionManager.setCurrentSession(currentSessionId);
        sessionManager.loadSessions();

        const sseClient = memoryPanel.init();
        sseClient.onOpen(() => {
            sseStatus.className = 'sse-status connected';
            sseStatus.textContent = 'SSE 已连接';
        });
        sseClient.onError((attempts) => {
            sseStatus.className = 'sse-status disconnected';
            if (attempts >= sseClient.maxReconnectAttempts) {
                sseStatus.textContent = '连接失败，请刷新页面';
            } else {
                sseStatus.textContent = `SSE 断开，重连中 (${attempts}/${sseClient.maxReconnectAttempts})`;
            }
        });

        function isNearBottom() {
            return chatUI.isNearBottom();
        }

        function smartScroll() {
            if (isNearBottom()) {
                chatUI.scrollToBottom();
                newMsgHint.style.display = 'none';
                userScrolledUp = false;
            } else {
                newMsgHint.style.display = 'block';
                userScrolledUp = true;
            }
        }

        function scrollToBottom() {
            chatUI.scrollToBottom();
            newMsgHint.style.display = 'none';
            userScrolledUp = false;
        }

        window.scrollToBottom = scrollToBottom;

        chatContainer.addEventListener('scroll', () => {
            if (isNearBottom()) {
                userScrolledUp = false;
                newMsgHint.style.display = 'none';
            } else {
                userScrolledUp = true;
            }
        });

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () => {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 150) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);
        stopBtn.addEventListener('click', stopGeneration);
        newSessionBtn.addEventListener('click', createNewSession);

        async function createNewSession() {
            currentSessionId = await sessionManager.createNewSession();
            chatUI.clear();
            messageInput.focus();
        }

        async function switchSession(sessionId) {
            if (sessionId === currentSessionId) return;
            currentSessionId = sessionId;
            sessionManager.setCurrentSession(sessionId);
            await sessionManager.loadSessions();

            chatContainer.innerHTML = '<div class="empty-state">加载中...</div>';
            
            try {
                const messages = await chatService.getSessionMessages(sessionId);
                chatContainer.innerHTML = '';
                
                if (messages.length === 0) {
                    chatContainer.innerHTML = '<div class="empty-state">发送消息开始对话</div>';
                    return;
                }

                await loadHistoryMessages(messages);
            } catch (e) {
                chatContainer.innerHTML = '<div class="empty-state">发送消息开始对话</div>';
            }

            messageInput.focus();
        }

        async function loadHistoryMessages(messages) {
            const toolResults = {};
            for (const msg of messages) {
                if ((msg.role === 'tool' || msg.role === 'tool-result') && msg.toolCallId) {
                    toolResults[msg.toolCallId] = msg;
                }
            }

            let i = 0;
            while (i < messages.length) {
                const msg = messages[i];
                if (msg.role === 'tool' || msg.role === 'tool-result') { i++; continue; }

                if (msg.role === 'user') {
                    if (msg.content && msg.content.trim()) {
                        const { msgDiv, editBtn } = chatUI.appendUserMessage(msg.content, msg.id);
                        if (editBtn) {
                            editBtn.addEventListener('click', () => startEditMessage(msgDiv));
                        }
                    }
                    i++;
                    continue;
                }

                if (msg.role === 'assistant') {
                    const segments = [];
                    let text = '';
                    let firstMsgTime = null;

                    while (i < messages.length) {
                        const am = messages[i];
                        
                        if (am.role === 'tool' || am.role === 'tool-result') {
                            i++;
                            continue;
                        }
                        
                        if (am.role !== 'assistant') {
                            break;
                        }
                        
                        const amText = am.content || '';
                        const hasToolCalls = am.tool_calls && am.tool_calls.length > 0;

                        if (!firstMsgTime && am.timestamp) {
                            firstMsgTime = am.timestamp;
                        }

                        if (amText.trim() && !hasToolCalls) {
                            if (text.trim()) segments.push({ type: 'text', content: text });
                            text = amText;
                            i++;
                            break;
                        }

                        if (text.trim()) {
                            segments.push({ type: 'text', content: text });
                            text = '';
                        }

                        if (amText.trim()) {
                            text = amText;
                        }

                        if (hasToolCalls) {
                            if (text.trim()) {
                                segments.push({ type: 'text', content: text });
                                text = '';
                            }
                            
                            for (const tc of am.tool_calls) {
                                let result = null;
                                let resultContent = null;
                                let error = null;
                                const tr = toolResults[tc.id];
                                if (tr) {
                                    result = tr.success ? 'success' : 'error';
                                    resultContent = tr.content || null;
                                    if (!tr.success) error = resultContent;
                                }
                                segments.push({
                                    type: 'tool',
                                    name: tc.name,
                                    args: tc.arguments,
                                    result: result,
                                    resultContent: resultContent,
                                    error: error
                                });
                            }
                        }
                        i++;
                    }

                    if (text.trim()) {
                        segments.push({ type: 'text', content: text });
                    }

                    const msgDiv = document.createElement('div');
                    msgDiv.className = 'message assistant';
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'message-content';

                    if (segments.length === 0 && !text.trim()) {
                        contentDiv.innerHTML = '<div style="color: var(--text-muted); font-style: italic; padding: 8px;">🤖 AI 未返回有效响应，请尝试重新发送</div>';
                    } else {
                        let html = '';
                        for (const seg of segments) {
                            if (seg.type === 'tool') {
                                html += chatUI.renderToolCard(seg);
                            } else if (seg.type === 'text' && seg.content) {
                                html += await renderMarkdown(seg.content);
                            }
                        }
                        contentDiv.innerHTML = html;
                    }
                    msgDiv.appendChild(contentDiv);

                    const btnContainer = document.createElement('div');
                    btnContainer.className = 'message-actions';

                    const retryBtn = document.createElement('button');
                    retryBtn.className = 'message-action-btn';
                    retryBtn.title = '重试';
                    retryBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>';
                    btnContainer.appendChild(retryBtn);

                    const copyBtn = document.createElement('button');
                    copyBtn.className = 'message-action-btn';
                    copyBtn.title = '复制';
                    copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                    btnContainer.appendChild(copyBtn);

                    copyBtn.onclick = () => {
                        const textToCopy = contentDiv.innerText;
                        navigator.clipboard.writeText(textToCopy).then(() => {
                            copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                            copyBtn.classList.add('copied');
                            setTimeout(() => {
                                copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                                copyBtn.classList.remove('copied');
                            }, 2000);
                        });
                    };

                    msgDiv.appendChild(btnContainer);

                    const timeDiv = document.createElement('div');
                    timeDiv.className = 'message-time';
                    timeDiv.textContent = firstMsgTime ? new Date(firstMsgTime).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                    msgDiv.appendChild(timeDiv);

                    chatContainer.appendChild(msgDiv);
                } else {
                    i++;
                }
            }
            smartScroll();
        }

        function startEditMessage(msgDiv) {
            const contentDiv = msgDiv.querySelector('.message-content');
            if (!contentDiv) return;
            const originalText = contentDiv.textContent;

            const textarea = document.createElement('textarea');
            textarea.className = 'message-edit-textarea';
            textarea.value = originalText;
            textarea.rows = Math.min(Math.max(originalText.split('\n').length, 2), 8);

            const editActions = document.createElement('div');
            editActions.className = 'message-edit-actions';

            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'message-edit-cancel';
            cancelBtn.textContent = '取消';
            cancelBtn.onclick = () => {
                contentDiv.style.display = '';
                const btnContainer = msgDiv.querySelector('.message-actions');
                if (btnContainer) btnContainer.style.display = '';
                textarea.remove();
                editActions.remove();
            };

            const saveBtn = document.createElement('button');
            saveBtn.className = 'message-edit-save';
            saveBtn.textContent = '保存并重新生成';
            saveBtn.onclick = () => {
                const newContent = textarea.value.trim();
                if (!newContent || newContent === originalText) {
                    cancelBtn.click();
                    return;
                }
                const messageId = msgDiv.dataset.messageId;
                contentDiv.style.display = '';
                const btnContainer = msgDiv.querySelector('.message-actions');
                if (btnContainer) btnContainer.style.display = '';
                textarea.remove();
                editActions.remove();
                sendMessage(newContent, messageId, msgDiv);
            };

            editActions.appendChild(cancelBtn);
            editActions.appendChild(saveBtn);

            contentDiv.style.display = 'none';
            const btnContainer = msgDiv.querySelector('.message-actions');
            if (btnContainer) btnContainer.style.display = 'none';

            msgDiv.insertBefore(textarea, contentDiv.nextSibling);
            msgDiv.insertBefore(editActions, textarea.nextSibling);
            textarea.focus();
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';

            textarea.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
                    e.preventDefault();
                    saveBtn.click();
                }
                if (e.key === 'Escape') {
                    cancelBtn.click();
                }
            });

            textarea.addEventListener('input', () => {
                textarea.style.height = 'auto';
                textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
            });
        }

        async function sendMessage(overrideContent, editMessageId, editMsgDiv) {
            const content = (typeof overrideContent === 'string' && overrideContent)
                ? overrideContent
                : messageInput.value.trim();
            if (!content) return;

            if (!overrideContent && !editMessageId) {
                messageInput.value = '';
                messageInput.style.height = 'auto';
            }
            lastUserMessage = content;

            if (editMessageId && editMsgDiv) {
                const contentDiv = editMsgDiv.querySelector('.message-content');
                if (contentDiv) contentDiv.textContent = content;
                const nextSibling = editMsgDiv.nextElementSibling;
                while (nextSibling) {
                    const toRemove = nextSibling;
                    nextSibling = nextSibling.nextElementSibling;
                    toRemove.remove();
                }
            } else {
                const { msgDiv, editBtn } = chatUI.appendUserMessage(content);
                if (editBtn) {
                    editBtn.addEventListener('click', () => startEditMessage(msgDiv));
                }
            }

            if (!sessionManager.sessionNames[currentSessionId]) {
                sessionManager.setSessionName(currentSessionId, content);
                sessionManager.loadSessions();
            }

            sendBtn.disabled = true;
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';

            let isCompleted = false;

            try {
                currentAbortController = new AbortController();
                const { contentDiv, copyBtn, retryBtn, btnContainer } = chatUI.appendAssistantMessage();
                let segments = [];
                let currentText = '';

                copyBtn.onclick = () => {
                    const textToCopy = contentDiv.innerText;
                    navigator.clipboard.writeText(textToCopy).then(() => {
                        copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
                        copyBtn.classList.add('copied');
                        setTimeout(() => {
                            copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
                            copyBtn.classList.remove('copied');
                        }, 2000);
                    });
                };

                retryBtn.onclick = () => {
                    if (!lastUserMessage) return;
                    chatService.stopGeneration(currentAbortController);
                    currentAbortController = new AbortController();
                    contentDiv.innerHTML = '<span class="typing-indicator">...</span>';
                    segments = [];
                    currentText = '';
                    btnContainer.style.display = 'none';
                    sendMessage(lastUserMessage);
                };

                await chatService.sendMessage(
                    currentSessionId,
                    content,
                    (parsed) => {
                        if (isCompleted) return;

                        if (parsed.type === 'retry') {
                            contentDiv.innerHTML = `<div style="color: var(--text-muted); font-style: italic; padding: 8px;">🔄 ${escapeHtml(parsed.message)}</div>`;
                            return;
                        }

                        if (parsed.content) {
                            currentText += parsed.content;
                            renderSegments(contentDiv, segments, currentText);
                            smartScroll();
                        }
                        
                        if (parsed.name && parsed.success === undefined) {
                            if (currentText.trim()) {
                                segments.push({ type: 'text', content: currentText });
                                currentText = '';
                            }
                            segments.push({ type: 'tool', name: parsed.name, args: parsed.args, result: null, error: null });
                            renderSegments(contentDiv, segments, currentText);
                        }
                        
                        if (parsed.name && parsed.success !== undefined) {
                            const existingTool = segments.find(s => s.type === 'tool' && s.name === parsed.name && !s.result);
                            if (existingTool) {
                                existingTool.result = parsed.success ? 'success' : 'error';
                                existingTool.error = parsed.error || null;
                                existingTool.resultContent = parsed.result || null;
                                renderSegments(contentDiv, segments, currentText);
                            }
                        }
                        
                        if (parsed.error) {
                            contentDiv.innerHTML = `<span style="color: var(--error-color);">❌ ${escapeHtml(parsed.message || parsed.error)}</span>`;
                        }
                    },
                    currentAbortController.signal,
                    currentSystemPrompt,
                    editMessageId || null
                );

                if (currentText.trim()) {
                    segments.push({ type: 'text', content: currentText });
                }
                
                if (segments.length === 0 && !currentText.trim()) {
                    contentDiv.innerHTML = '<div style="color: var(--text-muted); font-style: italic; padding: 8px;">🤖 AI 未返回有效响应，请尝试重新发送</div>';
                } else {
                    await renderSegmentsFinal(contentDiv, segments, '');
                }

                btnContainer.style.display = 'flex';
            } catch (error) {
                if (error.name === 'AbortError') {
                    if (currentText.trim()) {
                        segments.push({ type: 'text', content: currentText });
                    }
                    await renderSegmentsFinal(contentDiv, segments, '');
                    contentDiv.innerHTML += '<div style="color:var(--text-muted);font-size:12px;margin-top:8px;">⏹ 已停止生成</div>';
                } else {
                    contentDiv.innerHTML = `<span style="color: var(--error-color);">错误: ${error.message}</span>`;
                }

                btnContainer.style.display = 'flex';
            } finally {
                isCompleted = true;
                currentAbortController = null;
                sendBtn.disabled = false;
                sendBtn.style.display = 'inline-block';
                stopBtn.style.display = 'none';
                messageInput.focus();
            }
        }

        function stopGeneration() {
            chatService.stopGeneration(currentAbortController);
        }

        let renderTimer = null;
        let lastRenderedText = '';

        async function renderSegments(container, segments, currentText) {
            if (renderTimer) {
                clearTimeout(renderTimer);
            }

            const textToRender = currentText;
            const hasOpenCodeBlock = (textToRender.match(/```/g) || []).length % 2 === 1;

            renderTimer = setTimeout(async () => {
                let html = '';
                for (const segment of segments) {
                    if (segment.type === 'tool') {
                        html += chatUI.renderToolCard(segment);
                    } else if (segment.type === 'text' && segment.content) {
                        html += await renderMarkdown(segment.content);
                    }
                }

                if (textToRender) {
                    if (hasOpenCodeBlock) {
                        const lastFence = textToRender.lastIndexOf('```');
                        const beforeFence = textToRender.substring(0, lastFence);
                        const fenceLine = textToRender.substring(lastFence);
                        const langMatch = fenceLine.match(/^```(\w*)\n?([\s\S]*)/);
                        const lang = langMatch ? langMatch[1] || 'plaintext' : 'plaintext';
                        const codeContent = langMatch ? langMatch[2] : '';

                        if (beforeFence.trim()) {
                            html += await renderMarkdown(beforeFence);
                        }
                        const codeId = 'code-streaming-' + Math.random().toString(36).substr(2, 9);
                        html += `<div class="code-block-wrapper">
                            <div class="code-block-header">
                                <span class="code-lang">${escapeHtml(lang)}</span>
                                <button class="copy-btn" onclick="window.copyCode('${codeId}')">📋 复制</button>
                            </div>
                            <pre><code id="${codeId}" class="hljs language-${escapeHtml(lang)}">${escapeHtml(codeContent)}<span class="typing-indicator">▌</span></code></pre>
                        </div>`;
                    } else {
                        html += await renderMarkdown(textToRender);
                    }
                }

                container.innerHTML = html;
                lastRenderedText = textToRender;
            }, 30);
        }

        async function renderSegmentsFinal(container, segments, currentText) {
            if (renderTimer) {
                clearTimeout(renderTimer);
                renderTimer = null;
            }
            let html = '';
            for (const segment of segments) {
                if (segment.type === 'tool') {
                    html += chatUI.renderToolCard(segment);
                } else if (segment.type === 'text' && segment.content) {
                    html += await renderMarkdown(segment.content);
                }
            }
            if (currentText) {
                html += await renderMarkdown(currentText);
            }
            container.innerHTML = html;
        }
    </script>
</body>
</html>
